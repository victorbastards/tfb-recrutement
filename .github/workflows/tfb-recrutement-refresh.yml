name: Rafraîchir les données recrutement

# Extrait Teamtailor UNE FOIS PAR JOUR et commit data.js dans le repo.
# Le build Netlify réutilise ensuite ce data.js (build rapide).
# Nécessite le secret GitHub : TEAMTAILOR_API_KEY (et éventuellement
# TEAMTAILOR_STACK = eu, TEAMTAILOR_API_VERSION = 20240904).

on:
  workflow_dispatch:
  schedule:
    - cron: '20 5 * * *'   # ~07:20 Paris (été) / 06:20 (hiver)

permissions:
  contents: write

concurrency:
  group: recrutement-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Extraction Teamtailor -> data.js
        env:
          TEAMTAILOR_API_KEY: ${{ secrets.TEAMTAILOR_API_KEY }}
          TEAMTAILOR_STACK: ${{ secrets.TEAMTAILOR_STACK }}
          TEAMTAILOR_API_VERSION: ${{ secrets.TEAMTAILOR_API_VERSION }}
        run: |
          cp build-data.txt build-data.mjs
          node build-data.mjs

      - name: Commit data.js
        run: |
          git config user.name "tfb-bot"
          git config user.email "bot@thefrenchbastards.fr"
          git add data.js
          git commit -m "chore: refresh Teamtailor data $(date -u +%FT%TZ)" || echo "rien a committer"
          git pull --rebase origin main || true
          git push
